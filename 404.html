<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#070a0f" />
    <title>Página não encontrada | Tower Defensor</title>
    <link rel="icon" type="image/svg+xml" href="./assets/images/favicon.svg" />
    <style>
      * { box-sizing: border-box; }
      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        padding: 24px;
        background: #070a0f;
        color: #eff5fb;
        font-family: Arial, sans-serif;
      }
      main { width: min(560px, 100%); text-align: center; }
      img { width: 190px; height: auto; margin-bottom: 36px; }
      p { margin: 0 0 14px; color: #d8b35a; font-size: 13px; font-weight: 700; }
      h1 { margin: 0 0 18px; font-size: clamp(34px, 8vw, 58px); line-height: 1; }
      a {
        display: inline-block;
        margin-top: 18px;
        padding: 14px 20px;
        border-radius: 6px;
        background: #d8b35a;
        color: #101511;
        font-weight: 700;
        text-decoration: none;
      }
      a:focus-visible { outline: 3px solid #37c8ff; outline-offset: 4px; }
    </style>
  </head>
  <body>
    <main>
      <img src="./assets/images/logo-horizontal.svg" alt="Tower Defensor" />
      <p>ERRO 404</p>
      <h1>Página não encontrada</h1>
      <a href="./">Voltar ao início</a>
    </main>
  </body>
</html>
